    <style>
        .table-grid { 
            display: grid; 
            /* Fluid columns: minimum widths ensure legibility, fr units allow scaling */
            grid-template-columns: 40px 70px 90px minmax(100px, 1fr) minmax(200px, 2fr) minmax(150px, 1.5fr); 
            gap: 1.25rem; 
            align-items: start;
        }
        @media (max-width: 1024px) {
            .table-grid { 
                grid-template-columns: 40px 60px 80px minmax(90px, 1fr) minmax(150px, 2fr) minmax(120px, 1.5fr); 
                gap: 1rem;
            }
        }
        /* Mobile Stacking View */
        @media (max-width: 768px) {
            .table-grid { 
                display: flex;
                flex-direction: column;
                gap: 0.75rem; 
                border-bottom: 2px solid #e5e7eb; 
                padding: 1.5rem 1rem; 
            }
            .header-row { display: none !important; }
            .desktop-num { display: none; }
            .mobile-num { display: inline-block; font-weight: bold; color: #94a3b8; margin-right: 8px; }
        }
        @media (min-width: 769px) {
            .mobile-num { display: none; }
            .desktop-num { display: block; }
        }
        
        /* Prevent text blowout */
        .grid-item { min-width: 0; word-break: break-word; }
    </style>

        const vocabularyDB = {};
        for(let i=0; i<6; i++) {
            vocabularyDB[i+1] = rawDB.slice(i*50, (i+1)*50);
        }

        let currentBatch = 1;
        
        // CRITICAL: We must store the utterances in a global array. 
        // If we don't, Chrome deletes the variable before the phone finishes speaking!
        window.speechUtterances = [];

        // Global flag to track if we've bypassed Android's strict Audio security sandbox
        let audioInitialized = false;

        // Unlock Native Android Audio silently on the very first touch of the screen
        document.body.addEventListener('touchstart', function() {
            if (!audioInitialized && 'speechSynthesis' in window) {
                const silentUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(silentUtterance);
                audioInitialized = true;
            }
        }, { once: true });
        
        document.body.addEventListener('click', function() {
            if (!audioInitialized && 'speechSynthesis' in window) {
                const silentUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(silentUtterance);
                audioInitialized = true;
            }
        }, { once: true });

        function playAudio(text) {
            if (!('speechSynthesis' in window)) {
                console.warn("Speech Synthesis is not supported in this browser.");
                return;
            }
            
            // Stop current audio to prevent overlapping
            window.speechSynthesis.cancel();
            
            // Do NOT strip Chinese punctuation (。 ？), otherwise some API wrappers fail to parse it.
            // Only strip the English translation part entirely.
            const cleanText = text.replace(/\(.*?\)/g, '').trim();
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.85; // Slightly slower for better learner comprehension
            
            // Push to global array to prevent Android Garbage Collection bug
            window.speechUtterances.push(utterance);
            
            // Keep array from growing infinitely and consuming memory
            if(window.speechUtterances.length > 20) {
                window.speechUtterances.shift();
            }
            
            // Small delay fixes an Android race condition where cancel() kills the new utterance
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        const vocabContainer = document.getElementById('vocabContainer');
        const tabContainer = document.getElementById('tabContainer');

        function initTabs() {
            tabContainer.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-6 py-2.5 rounded-full font-bold shadow-sm transition-all text-sm uppercase tracking-wide ${currentBatch === i ? 'bg-blue-600 text-white shadow-md ring-2 ring-blue-300 ring-offset-2' : 'bg-white border border-slate-200 text-blue-900 hover:bg-slate-50'}`;
                btn.innerText = `Batch ${i}`;
                btn.onclick = () => { currentBatch = i; initTabs(); renderBatch(); };
                tabContainer.appendChild(btn);
            }
        }

        function renderBatch() {
            vocabContainer.innerHTML = '';
            const list = vocabularyDB[currentBatch];
            const startIndex = (currentBatch - 1) * 50;

            list.forEach((item, index) => {
                const rowNum = startIndex + index + 1; // True 1-300 ordering
                const [char, pinyin, meaning, example, grammar] = item;
                
                // SAFE SPLIT: Extract Chinese and English without losing words inside parentheses
                let cnText = example;
                let enText = "";
                const splitIndex = example.indexOf('(');
                
                if(splitIndex !== -1) {
                    cnText = example.substring(0, splitIndex).trim();
                    // Get everything after the first '(', and safely remove the last ')'
                    enText = example.substring(splitIndex + 1).replace(/\)$/, '').trim();
                }

                // 6th Column Grammar HTML
                const grammarHtml = grammar ? 
                    `<div class="p-3 bg-purple-50 text-purple-800 text-xs leading-relaxed rounded-lg border border-purple-100 flex items-start gap-2 shadow-sm">
                        <span title="Grammar Note" class="text-base">💡</span> 
                        <span class="mt-0.5">${grammar}</span>
                     </div>` : '<div class="text-slate-300 text-xs italic">-</div>';

                vocabContainer.innerHTML += `
                    <div class="p-4 table-grid border-b border-slate-100 hover:bg-slate-50 transition-colors group">
                        <div class="text-slate-400 font-mono text-sm self-start mt-2 hidden md:block desktop-num">#${rowNum}</div>
                        
                        <div class="font-bold text-2xl text-slate-800 flex items-center gap-2 self-start mt-1 grid-item">
                            <span class="mobile-num">#${rowNum}</span>
                            ${char}
                            <button onclick="playAudio('${char}')" class="text-lg opacity-50 group-hover:opacity-100 transition-opacity hover:scale-110 active:scale-90" title="Listen">🔊</button>
                        </div>
                        
                        <div class="text-blue-600 text-lg font-medium self-start mt-1 grid-item">${pinyin}</div>
                        
                        <div class="text-slate-600 self-start mt-2 grid-item leading-snug">${meaning}</div>
                        
                        <!-- Example Sentence Column -->
                        <div class="flex flex-col gap-2 self-start grid-item">
                            <div class="flex items-start gap-2">
                                <span class="font-bold text-slate-800 text-lg leading-snug">${cnText}</span>
                                <button onclick="playAudio('${cnText}')" class="text-sm bg-slate-200 hover:bg-blue-200 text-slate-700 rounded-full w-8 h-8 flex items-center justify-center shrink-0 shadow-sm transition-transform active:scale-95 mt-0.5" title="Listen">🔊</button>
                            </div>
                            
                            ${enText ? `
                            <div class="w-full mt-1">
                                <button onclick="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')" class="w-full text-left cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-2.5 rounded-lg transition-colors border border-slate-200 flex justify-between items-center shadow-sm">
                                    <span class="font-medium">👁️ Tap to reveal translation</span>
                                </button>
                                <div class="hidden cursor-pointer bg-blue-50 text-blue-900 text-sm px-4 py-3 rounded-lg border border-blue-200 shadow-inner" onclick="this.classList.add('hidden'); this.previousElementSibling.classList.remove('hidden')">
                                    <div class="text-blue-600 font-bold mb-1.5 text-xs uppercase tracking-wider border-b border-blue-100 pb-1 w-max">${pinyin}</div>
                                    <div class="leading-relaxed text-slate-700">${enText}</div>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                        
                        <!-- Grammar Column -->
                        <div class="self-start mt-1 grid-item">
                            ${grammarHtml}
                        </div>
                    </div>
                `;
            });
            generateDynamicTest(list);
        }

        function generateDynamicTest(list) {
            document.getElementById('testTitle').innerText = `Cumulative Test (Batch ${currentBatch})`;
            const container = document.getElementById('testContent');
            
            const shuffled = [...list].sort(() => 0.5 - Math.random());
            const testWords = shuffled.slice(0, 4);

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            
            testWords.forEach((item, index) => {
                html += `
                    <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3 transition-shadow hover:shadow-md">
                        <div class="text-slate-500 text-xs font-bold uppercase tracking-wider">Question ${index + 1}</div>
                        <div class="font-bold text-lg text-slate-800">Translate: <span class="text-blue-700 font-black">"${item[2]}"</span></div>
                        <input type="text" placeholder="Type Chinese Pinyin or Character" class="w-full border-2 border-slate-200 p-3 rounded-lg focus:border-blue-500 outline-none transition-colors mt-1">
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        // Initialize automatically on load
        window.onload = () => {
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('unlockOverlay').style.display = 'none';
            initTabs();
            renderBatch();
        };
    </script>

		// Create an AudioContext that stays alive for the duration of the session
		const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
		// Resume context on first touch (Required by Chrome/Brave/Android)
		document.addEventListener('touchstart', function() {
			if (audioCtx.state === 'suspended') {
				audioCtx.resume();
			}
		}, { once: true });

		/* STREAMING_CHUNK:Replacing audio engine with Native SpeechSynthesis... */
		function playAudio(text) {
		    // 1. Cancel previous speech
		    window.speechSynthesis.cancel();
    
		    // 2. Clean the text (remove pinyin/translations in parenthesis)
		    const cleanText = text.replace(/\(.*?\)/g, '').trim();
    
		    // 3. Create native utterance
		    const utterance = new SpeechSynthesisUtterance(cleanText);
    
		    // 4. Force Mandarin (Mandarin is usually the default, but we set it explicitly)
		    utterance.lang = 'zh-CN';
		    utterance.rate = 0.9; // Slightly slower for better clarity
		    utterance.pitch = 1;
    
		    // 5. Trigger
		    window.speechSynthesis.speak(utterance);
		}

        let currentBatch = 1;

        function initTabs() {
            const container = document.getElementById('tabContainer');
            container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.innerText = `Batch ${i}`;
                btn.className = `px-4 py-2 rounded-full font-medium transition-colors duration-200 ${currentBatch === i ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`;
                btn.onclick = () => {
                    currentBatch = i;
                    initTabs();
                    renderBatch();
                };
                container.appendChild(btn);
            }
        }

        function renderBatch() {
            const vocabList = vocabularyDB[currentBatch];
            const vocabContainer = document.getElementById('vocabContainer');
            vocabContainer.innerHTML = '';

            vocabList.forEach(item => {
                const [char, pinyin, meaning, example] = item;
                
                const exParts = example.split('(');
                const exChn = exParts[0].trim();
                const exEng = exParts[1] ? '(' + exParts[1] : '';

                const row = document.createElement('div');
                row.className = 'p-4 md:p-4 table-grid items-start border-b border-slate-100 hover:bg-slate-50 transition-colors';
                
                row.innerHTML = `
                    <div class="flex items-center gap-2 mb-2 md:mb-0">
                        <span class="text-xl font-bold text-slate-800">${char}</span>
                        <button onclick="playAudio('${char}')" class="text-xl hover:scale-110 transition-transform" title="Listen">🔊</button>
                    </div>
                    <div class="text-blue-600 mb-1 md:mb-0">${pinyin}</div>
                    <div class="text-slate-600 mb-3 md:mb-0">${meaning}</div>
                    
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2">
                            <span class="text-lg font-bold text-slate-800">${exChn}</span>
                            <button onclick="playAudio('${exChn}')" class="text-lg hover:scale-110 transition-transform" title="Listen">🔊</button>
                        </div>
                        
                        ${exEng ? `
                        <div class="mt-2">
                            <div class="inline-block cursor-pointer bg-slate-200 hover:bg-slate-300 text-slate-500 text-xs px-3 py-1.5 rounded-md transition-colors" 
                                 onclick="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')">
                                👁️ Tap to reveal translation
                            </div>
                            <div class="hidden cursor-pointer bg-blue-50 text-blue-900 text-sm px-3 py-2 rounded-md border border-blue-100"
                                 onclick="this.classList.add('hidden'); this.previousElementSibling.classList.remove('hidden')"
                                 title="Tap to hide">
                                ${exEng}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
                vocabContainer.appendChild(row);
            });

            generateDynamicTest(vocabList);
        }

        function generateDynamicTest(vocabList) {
            document.getElementById('testTitle').innerText = `Cumulative Test (Batch ${currentBatch})`;
            const testContent = document.getElementById('testContent');
            testContent.innerHTML = '';

            let s1HTML = `<div class="mb-8"><h3 class="font-bold text-lg mb-4 border-b pb-2">1. Listening Comprehension</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            vocabList.slice(0, 8).forEach((item, index) => {
                s1HTML += `
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <p class="text-sm text-slate-500 mb-2">Question ${index + 1}</p>
                        <div class="flex items-center gap-3">
                            <button onclick="playAudio('${item[3].split('(')[0]}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow-sm text-sm transition-colors">Listen</button>
                            <select class="border rounded p-2 text-sm flex-1">
                                <option>Select Meaning...</option>
                                <option>${item[2]}</option>
                                <option>Incorrect Option</option>
                            </select>
                        </div>
                    </div>`;
            });
            s1HTML += `</div></div>`;

            let s2HTML = `<div class="mb-8"><h3 class="font-bold text-lg mb-4 border-b pb-2">2. Translation (EN to CN)</h3><div class="space-y-4">`;
            vocabList.slice(8, 16).forEach((item, index) => {
                s2HTML += `
                    <div>
                        <p class="mb-2">"${item[2]}"</p>
                        <input type="text" placeholder="Type Chinese here..." class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>`;
            });
            s2HTML += `</div></div>`;

            let s3HTML = `<div class="mb-8"><h3 class="font-bold text-lg mb-4 border-b pb-2">3. Character Recognition</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4">`;
            vocabList.slice(16, 24).forEach((item, index) => {
                s3HTML += `
                    <div class="text-center p-4 border rounded-lg bg-slate-50">
                        <p class="text-2xl font-bold mb-2">${item[0]}</p>
                        <input type="text" placeholder="Pinyin..." class="w-full border p-1 rounded text-sm text-center">
                    </div>`;
            });
            s3HTML += `</div></div>`;

            let s4HTML = `
                <div class="mb-8">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">4. Grammar (Fill in the blanks)</h3>
                    <div class="space-y-4">
            `;
            vocabList.slice(24, 32).forEach((item, index) => {
                const exParts = item[3].split('(');
                const cnText = exParts[0].trim();
                const engText = exParts[1] ? exParts[1].replace(')', '') : '';
                const blanchedText = cnText.replace(item[0], `<input type="text" class="w-16 border-b border-slate-400 outline-none px-1 text-center bg-transparent" placeholder="?">`);
                
                s4HTML += `<div>${index + 1}. ${blanchedText} <span class="text-slate-500 text-sm ml-2">(${engText})</span></div>`;
            });
            s4HTML += `</div></div>`;

            testContent.innerHTML = s1HTML + s2HTML + s3HTML + s4HTML;
        }

        window.onload = () => {
            initTabs();
            renderBatch();
        };

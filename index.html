            // BATCH 6 (251-300)
            ["让", "ràng", "let / make", "让他去。(Let him go.)", ""],
            ["笑", "xiào", "laugh / smile", "他在笑。(He is laughing.)", ""],

            ["打篮球", "dǎ lánqiú", "play basketball", "打篮球。(Play basketball.)", ""],
            ["上班", "shàngbān", "go to work", "去上班。(Go to work.)", ""],

            ["帮忙", "bāngmáng", "to help", "请帮个忙。(Please do me a favor.)", "Verb-Object structure: Unlike 帮助, you cannot put an object directly after it."],
            ["希望", "xīwàng", "hope", "我希望你能来。(I hope you can come.)", ""],
            ["玩", "wán", "play", "出去玩。(Go out to play.)", ""],

            ["花", "huā", "flower / to spend", "开花。(Flowers bloom.)", ""],
            ["船", "chuán", "boat", "坐船。(Take a boat.)", ""],
            ["北京", "Běijīng", "Beijing", "去北京。(Go to Beijing.)", ""],
            ["中国", "Zhōngguó", "China", "我是中国人。(I am Chinese.)", ""],
            ["词汇", "cíhuì", "vocabulary", "学词汇。(Learn vocabulary.)", ""],
            ["生日", "shēngrì", "birthday", "生日快乐。(Happy birthday.)", ""],
            ["晚", "wǎn", "late", "太晚了。(Too late.)", ""],
            ["同", "tóng", "same", "同学。(Classmate.)", ""],

            ["黄", "huáng", "yellow", "黄色。(Yellow.)", ""],
            ["绿", "lǜ", "green", "绿色。(Green.)", ""],
            ["暖和", "nuǎnhuo", "warm", "天气暖和。(Warm weather.)", ""],
            ["凉快", "liángkuai", "pleasantly cool", "很凉快。(Very pleasantly cool.)", ""]
        ];

        // Group into 6 batches
        const vocabularyDB = {};
        for(let i=0; i<6; i++) {
            vocabularyDB[i+1] = rawDB.slice(i*50, (i+1)*50);
        }

        let currentBatch = 1;
        
        // Use a single, persistent HTML5 Audio object
        // This easily bypasses Android's strict Synthesis limitations and CORS blocks
        const globalAudio = new Audio();

        const vocabContainer = document.getElementById('vocabContainer');
        const tabContainer = document.getElementById('tabContainer');

        function playAudio(text) {
            const cleanText = text.replace(/\(.*?\)/g, '').trim();
            
            // Primary Engine: Youdao Dictionary API (CORS-friendly, built for Chinese)
            const url = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanText)}&le=zh`;
            globalAudio.src = url;
            
            globalAudio.play().catch(error => {
                console.warn("Network audio failed, falling back to native TTS", error);
                
                // Fallback Engine: Native Speech Synthesis (just in case)
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function initTabs() {
            tabContainer.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-full font-bold shadow-sm transition-colors ${currentBatch === i ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200 text-blue-900 hover:bg-slate-50'}`;
                btn.innerText = `Batch ${i}`;
                btn.onclick = () => { currentBatch = i; initTabs(); renderBatch(); };
                tabContainer.appendChild(btn);
            }
        }

        function renderBatch() {
            vocabContainer.innerHTML = '';
            const list = vocabularyDB[currentBatch];
            const startIndex = (currentBatch - 1) * 50;

            list.forEach((item, index) => {
                const rowNum = startIndex + index + 1; // 1 to 300 numbering
                const [char, pinyin, meaning, example, grammar] = item;
                
                // Tap-to-Reveal parsing
                const exParts = example.split('(');
                const cnText = exParts[0].trim();
                const enText = exParts[1] ? '(' + exParts[1] : '';

                const grammarHtml = grammar ? 
                    `<div class="mt-2 p-2 bg-purple-50 text-purple-800 text-xs rounded border border-purple-100 flex items-start gap-1">
                        <span title="Grammar Note">💡</span> <span>${grammar}</span>
                     </div>` : '';

                vocabContainer.innerHTML += `
                    <div class="p-4 table-grid border-b border-slate-100 hover:bg-slate-50 transition-colors">
                        <div class="text-slate-400 font-mono text-sm self-center">#${rowNum}</div>
                        <div class="font-bold text-2xl text-slate-800 flex items-center gap-2">
                            <span class="mobile-num">#${rowNum}</span>
                            ${char}
                            <button onclick="playAudio('${char}')" class="text-lg hover:scale-110 active:scale-90 transition-transform cursor-pointer" title="Listen">🔊</button>
                        </div>
                        <div class="text-blue-600 text-lg self-center">${pinyin}</div>
                        <div class="text-slate-600 self-center">${meaning}</div>
                        <div class="flex flex-col justify-center">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-bold text-slate-800">${cnText}</span>
                                <button onclick="playAudio('${cnText}')" class="text-sm hover:scale-110 active:scale-90 transition-transform cursor-pointer" title="Listen">🔊</button>
                            </div>
                            
                            ${enText ? `
                            <div>
                                <div onclick="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')" class="inline-block cursor-pointer bg-slate-200 hover:bg-slate-300 text-slate-600 text-xs px-3 py-1 rounded transition-colors">
                                    👁️ Tap to reveal translation
                                </div>
                                <div class="hidden cursor-pointer bg-blue-50 text-blue-900 text-sm px-3 py-1.5 rounded border border-blue-100 transition-opacity" onclick="this.classList.add('hidden'); this.previousElementSibling.classList.remove('hidden')">
                                    ${enText}
                                </div>
                            </div>
                            ` : ''}
                            
                            ${grammarHtml}
                        </div>
                    </div>
                `;
            });
            generateDynamicTest(list);
        }

        function generateDynamicTest(list) {
            document.getElementById('testTitle').innerText = `Cumulative Test (Batch ${currentBatch})`;
            const container = document.getElementById('testContent');
            
            // Randomize and slice 5 words
            const shuffled = [...list].sort(() => 0.5 - Math.random());
            const testWords = shuffled.slice(0, 5);

            let html = `<h3 class="font-bold text-lg mb-4 border-b pb-2">Translation Challenge</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            
            testWords.forEach((item, index) => {
                html += `
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm flex flex-col gap-2">
                        <div class="text-slate-500 text-sm">Question ${index + 1}</div>
                        <div class="font-bold">Translate: <span class="text-blue-800">"${item[2]}"</span></div>
                        <input type="text" placeholder="Type Chinese Pinyin or Character" class="w-full border border-slate-300 p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none mt-1">
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        // Initialize automatically on load
        window.onload = () => {
            initTabs();
            renderBatch();
        };
    </script>

            testDatabase[b] = {
                title: `Batch ${b} Cumulative Test`,
                desc: `Complete all 40 questions to verify your mastery of Batch ${b}.`,
                s1: sample.slice(0, 8).map(item => ({ q: item[3], a: [item[4].split(' - ')[1] || item[2], "Alternative option"] })),
                s2: sample.slice(8, 16).map((item, i) => ({ num: i + 9, pin: item[1], ph: "English translation..." })),
                s3: sample.slice(16, 24).map((item, i) => ({ num: i + 17, char: item[0], ph: "English translation..." })),
                s4: sample.slice(24, 32).map((item, i) => ({ num: i + 25, eng: item[2], ph: "Chinese characters or pinyin..." })),
                s5: sample.slice(32, 40).map((item, i) => ({ num: i + 33, eng: (item[4].split(' - ')[1] || item[2]), ph: "Type Chinese sentence..." }))
            };
        }

        // Pre-load voices into memory for Android Chrome
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = function() {
                window.speechSynthesis.getVoices();
            };
        }

        window.onload = function() {
            switchBatch(1);
        };

        function switchBatch(batchNum) {
            currentBatch = batchNum;
            
            // Highlight active navigation tab
            for (let i = 1; i <= 6; i++) {
                const btn = document.getElementById(`btn-batch-${i}`);
                if (btn) {
                    if (i === batchNum) {
                        btn.className = "px-6 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition-all duration-150 border border-blue-600";
                    } else {
                        btn.className = "px-6 py-3 font-bold rounded-lg transition-all duration-150 shadow-sm border border-gray-200 bg-white text-gray-700 hover:bg-gray-50";
                    }
                }
            }

            // Update Header labels
            document.getElementById('dashboard-title').innerText = `HSK 3.1 (2026) Level 1 Mastery Suite - Batch ${batchNum}`;
            document.getElementById('dashboard-subtitle').innerText = `Batch ${batchNum}: Words ${((batchNum - 1) * 50) + 1} to ${batchNum * 50}. Core characters, pinyin, and layered examples.`;

            // Populate Vocabulary List
            populateVocabulary(batchNum);

            // Populate Test Content
            populateTest(batchNum);
        }

        function populateVocabulary(batchNum) {
            const data = hskData[batchNum];
            const listContainer = document.getElementById('vocab-list');
            listContainer.innerHTML = '';

            data.forEach(item => {
                const row = document.createElement('div');
                // Clean 4-column Grid layout matching exactly the width and column sizes: grid-cols-[1.2fr_1.2fr_1.2fr_2.5fr]
                row.className = "grid grid-cols-[1.2fr_1.2fr_1.2fr_2.5fr] gap-4 items-center p-5 border-b border-gray-200 hover:bg-blue-50 transition-colors";
                
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl md:text-3xl font-extrabold text-gray-950">${item[0]}</span>
                        <button onclick="playAudio('${item[0]}')" class="text-blue-500 hover:text-blue-700 text-2xl focus:outline-none" title="Play Character">🔊</button>
                    </div>
                    <div class="text-lg md:text-xl font-medium text-gray-800">${item[1]}</div>
                    <div class="text-base md:text-lg text-gray-600 font-medium">${item[2]}</div>
                    <div class="flex items-center justify-between gap-3">
                        <!-- Example layout explicitly stacked vertically: Chinese (bold/neutral) on Top, Pinyin/English (dark blue) below -->
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-gray-950">${item[3]}</span>
                            <span class="text-sm font-medium text-blue-900 mt-1">${item[4]}</span>
                        </div>
                        <button onclick="playAudio('${item[3]}')" class="text-blue-500 hover:text-blue-700 text-2xl shrink-0 focus:outline-none" title="Play Sentence">🔊</button>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function populateTest(batchNum) {
            const test = testDatabase[batchNum];
            const testContainer = document.getElementById('dynamic-test-section');
            
            let s1Html = '';
            test.s1.forEach((item, index) => {
                s1Html += `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 p-4 bg-gray-50 rounded-lg border border-gray-200 hover:shadow-sm transition-shadow">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-blue-800 w-6">${index + 1}.</span>
                            <button onclick="playAudio('${item.q}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded font-semibold text-sm transition-colors">🔊 Listen Prompt</button>
                        </div>
                        <select id="s1-ans-${index}" class="border border-gray-300 p-2 rounded flex-1 md:max-w-md focus:ring-2 focus:ring-blue-400 focus:outline-none bg-white font-medium text-gray-700">
                            <option value="">-- Choose matching translation --</option>
                            <option value="${item.a[0]}">${item.a[0]}</option>
                            <option value="${item.a[1]}">${item.a[1]}</option>
                        </select>
                    </div>
                `;
            });

            let s2Html = '';
            test.s2.forEach(item => {
                s2Html += `
                    <div class="flex items-center gap-4 p-2 bg-gray-50 rounded-lg border border-gray-100">
                        <span class="font-bold text-blue-800 w-8 text-right">${item.num}.</span>
                        <span class="w-32 font-mono text-lg text-blue-900 font-semibold">${item.pin}</span>
                        <input type="text" id="s2-ans-${item.num}" class="border border-gray-300 p-2 rounded flex-1 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-white text-gray-800" placeholder="${item.ph}">
                    </div>
                `;
            });

            let s3Html = '';
            test.s3.forEach(item => {
                s3Html += `
                    <div class="flex items-center gap-4 p-2 bg-gray-50 rounded-lg border border-gray-100">
                        <span class="font-bold text-blue-800 w-8 text-right">${item.num}.</span>
                        <span class="w-32 text-xl font-bold text-gray-900">${item.char}</span>
                        <input type="text" id="s3-ans-${item.num}" class="border border-gray-300 p-2 rounded flex-1 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-white text-gray-800" placeholder="${item.ph}">
                    </div>
                `;
            });

            let s4Html = '';
            test.s4.forEach(item => {
                s4Html += `
                    <div class="flex items-center gap-4 p-2 bg-gray-50 rounded-lg border border-gray-100">
                        <span class="font-bold text-blue-800 w-8 text-right">${item.num}.</span>
                        <span class="w-48 font-medium text-gray-800">${item.eng}</span>
                        <input type="text" id="s4-ans-${item.num}" class="border-b-2 border-blue-300 p-2 flex-1 focus:border-blue-600 focus:outline-none bg-transparent text-gray-950 font-bold" placeholder="${item.ph}">
                    </div>
                `;
            });

            let s5Html = '';
            test.s5.forEach(item => {
                s5Html += `
                    <div class="flex flex-col md:flex-row md:items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <span class="font-bold text-blue-800 w-8">${item.num}.</span>
                        <span class="w-64 font-medium text-gray-800">${item.eng}</span>
                        <input type="text" id="s5-ans-${item.num}" class="border border-gray-300 p-2 rounded flex-1 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-white text-gray-950 font-bold" placeholder="${item.ph}">
                    </div>
                `;
            });

            testContainer.innerHTML = `
                <h2 class="text-3xl font-extrabold text-gray-900 mb-2">${test.title}</h2>
                <p class="text-gray-600 mb-8 text-base md:text-lg">${test.desc}</p>
                
                <!-- Section 1 -->
                <div class="mb-8 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-xl md:text-2xl font-bold text-blue-800 mb-4 border-b pb-2">1. Listening Comprehension (1-8)</h3>
                    <p class="text-gray-500 mb-4 text-sm font-medium">Click the audio button to listen, then select the correct English translation from the dropdown.</p>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${s1Html}
                    </div>
                </div>

                <!-- Section 2 -->
                <div class="mb-8 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-xl md:text-2xl font-bold text-blue-800 mb-4 border-b pb-2">2. Pinyin to English (9-16)</h3>
                    <p class="text-gray-500 mb-4 text-sm font-medium">Type the correct English translation for each Pinyin representation.</p>
                    <div class="grid md:grid-cols-2 gap-x-8 gap-y-4">
                        ${s2Html}
                    </div>
                </div>

                <!-- Section 3 -->
                <div class="mb-8 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-xl md:text-2xl font-bold text-blue-800 mb-4 border-b pb-2">3. Character Translation (17-24)</h3>
                    <p class="text-gray-500 mb-4 text-sm font-medium">Identify the meaning of these written Chinese characters.</p>
                    <div class="grid md:grid-cols-2 gap-x-8 gap-y-4">
                        ${s3Html}
                    </div>
                </div>

                <!-- Section 4 -->
                <div class="mb-8 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-xl md:text-2xl font-bold text-blue-800 mb-4 border-b pb-2">4. English to Chinese (25-32)</h3>
                    <p class="text-gray-500 mb-4 text-sm font-medium">Type the Chinese characters or Pinyin equivalents for the given English translation.</p>
                    <div class="grid md:grid-cols-2 gap-x-8 gap-y-4">
                        ${s4Html}
                    </div>
                </div>

                <!-- Section 5 -->
                <div class="mb-8 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-xl md:text-2xl font-bold text-blue-800 mb-4 border-b pb-2">5. Sentence Building & Grammar (33-40)</h3>
                    <p class="text-gray-500 mb-4 text-sm font-medium">Translate the English sentences into full written Chinese structures.</p>
                    <div class="space-y-4">
                        ${s5Html}
                    </div>
                </div>

                <!-- Action Button -->
                <div class="text-center mt-8">
                    <button onclick="revealAnswers()" class="px-8 py-3 bg-blue-600 text-white font-extrabold rounded-lg shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all duration-150">Grade Test & Show Answers</button>
                    <p id="grade-summary" class="mt-4 text-xl font-bold text-green-700 hidden"></p>
                </div>
            `;
        }

        function playAudio(text) {
            // Clean text (strips out any English translations separated by hyphens)
            const cleanText = text.split('-')[0].trim();

            if ('speechSynthesis' in window) {
                // Bugfix for Android: Resume the engine before speaking to un-jam it
                window.speechSynthesis.resume();
                window.speechSynthesis.cancel();
                
                const u = new SpeechSynthesisUtterance(cleanText);
                u.lang = 'zh-CN';
                u.rate = 0.85; 
                
                // Explicitly find and assign a Chinese voice (crucial for Chrome Mobile)
                const voices = window.speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.toLowerCase().includes('cmn') || v.name.toLowerCase().includes('chinese'));
                if (zhVoice) {
                    u.voice = zhVoice;
                }

                // If the native TTS engine throws an error, fallback to cloud audio
                u.onerror = function() {
                    console.warn("Native TTS Error, switching to fallback.");
                    playFallbackAudio(cleanText);
                };

                window.speechSynthesis.speak(u);

                // Android Brave/Chrome Shield Bug: Speak is called but silently blocked.
                // We check if it's actually speaking after 300ms. If not, force the fallback.
                setTimeout(() => {
                    if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                        playFallbackAudio(cleanText);
                    }
                }, 300);

            } else {
                playFallbackAudio(cleanText);
            }
        }

        // Reliable fallback using a public dictionary TTS API (Bypasses Brave Shields & Android Web Speech bugs)
        function playFallbackAudio(text) {
            // Google Translate Widget TTS (tw-ob) safely plays in HTML Audio elements on mobile
            const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=' + encodeURIComponent(text);
            const audio = new Audio(url);
            audio.play().catch(err => {
                console.warn("Fallback audio also failed. Please check browser media permissions.", err);
            });
        }

        function revealAnswers() {
            const summary = document.getElementById('grade-summary');
            summary.innerText = "Assessment graded! Scroll through your inputs to check your answers against the vocabulary lists.";
            summary.classList.remove('hidden');
            summary.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
